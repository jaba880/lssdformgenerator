<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSSD - Backhome Program</title>
    <style>
        :root {
            --lssd-green: #354920;
            --bg-dark: #121212;
            --panel-bg: #1a1a1a;
            --input-bg: #222;
            --text-gray: #b3b3b3;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            width: 100%;
            max-width: 850px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
        }

        /* ШАПКА С ЛОГОТИПОМ */
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--lssd-green);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .logo-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-img {
            width: 70px;
            height: auto;
        }

        .logo-text {
            text-transform: uppercase;
            line-height: 1.2;
        }

        .logo-text .city { font-size: 1.2em; font-weight: bold; letter-spacing: 1px; }
        .logo-text .dept { font-size: 0.8em; color: var(--lssd-green); font-weight: bold; }

        .emergency-side {
            text-align: right;
            line-height: 1.1;
        }

        .emergency-side .acronym { font-size: 2em; font-weight: 900; letter-spacing: 2px; }
        .emergency-side .call { font-size: 0.8em; color: #cc0000; font-weight: bold; }

        /* СТИЛИ СЕКЦИЙ (из прошлого шага) */
        .section-header {
            background: var(--lssd-green);
            color: white;
            text-align: center;
            font-size: 0.85em;
            padding: 6px;
            margin: 25px 0 15px 0;
            text-transform: uppercase;
            font-weight: bold;
        }

        .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-group { display: flex; flex-direction: column; margin-bottom: 15px; }
        label { font-size: 0.7em; color: var(--text-gray); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        
        input, textarea {
            background: var(--input-bg);
            border: 1px solid #444;
            color: white;
            padding: 12px;
            font-size: 0.9em;
            outline: none;
        }
        
        input:focus { border-color: var(--lssd-green); }

        .agreement-box {
            font-size: 0.8em;
            color: #777;
            text-align: justify;
            border: 1px solid #222;
            padding: 15px;
            margin-top: 15px;
            font-style: italic;
        }

        .btn-generate {
            background: var(--lssd-green);
            color: white;
            border: none;
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        #output-box {
            margin-top: 20px;
            display: none;
            background: #000;
            padding: 15px;
            border: 1px dashed var(--lssd-green);
            font-family: monospace;
            font-size: 12px;
            color: #8fbc8f;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<div class="form-container">
    <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
    <div class="header-top">
        <div class="logo-side">
            <img src="https://www.upload.ee" class="logo-img" alt="LSSD">
            <div class="logo-text">
                <div class="city">ЛОС-САНТОС</div>
                <div class="dept">ДЕПАРТАМЕНТ ШЕРИФА</div>
            </div>
        </div>
        <div class="emergency-side">
            <div class="acronym">LSSD</div>
            <div class="call">ЭКСТРЕННЫЕ СЛУЖБЫ</div>
        </div>
    </div>

    <div style="text-align: center; font-size: 0.9em; letter-spacing: 3px; color: var(--text-gray);">
        ПРОГРАММА «ВОЗВРАЩЕНИЕ ДОМОЙ»
    </div>

    <!-- ПОЛЯ ВВОДА -->
    <div class="section-header">1. ИНФОРМАЦИЯ О ПРОШЛЫХ МЕСТАХ ИГРЫ</div>
    
    <div class="form-group">
        <label>1.1. Имя Фамилия Вашего персонажа (никнейм):</label>
        <input type="text" id="nick" placeholder="Name Surname">
    </div>

    <div class="form-group">
        <label>1.2. Фракции, проекты, ранги и даты ухода:</label>
        <textarea id="factions" placeholder="LSPD, SAPD..."></textarea>
    </div>

    <div class="grid-row">
        <div class="form-group">
            <label>1.3. Желаемая роль/отдел:</label>
            <input type="text" id="rank" placeholder="SEB / OSS / Detective">
        </div>
        <div class="form-group">
            <label>1.4. Причина ухода с прошлых мест:</label>
            <input type="text" id="reason" placeholder="ПСЖ / Расформ">
        </div>
    </div>

    <div class="section-header">2. ИНФОРМАЦИЯ О ПОДАЮЩЕМ ЗАЯВЛЕНИЕ</div>

    <div class="grid-row">
        <div class="form-group">
            <label>2.1. Ваш возраст (OOC):</label>
            <input type="text" id="age" placeholder="20 лет">
        </div>
        <div class="form-group">
            <label>2.2. Связь (TG/VK):</label>
            <input type="text" id="social" placeholder="@username">
        </div>
    </div>

    <div class="form-group">
        <label>2.3. Доказательства игры (СС):</label>
        <input type="text" id="proofs" placeholder="Ссылки на фотохостинги">
    </div>

    <div class="agreement-box">
        Я подтверждаю, что все данные верны. Я согласен с правилами сообщества и готов нести ответственность за свою игру.
    </div>

    <button class="btn-generate" onclick="generateBB()">Сгенерировать код заявления</button>

    <div id="output-box"></div>
</div>

<script>
function generateBB() {
    const v = (id) => document.getElementById(id).value || "Заполнить";
    
    const bb = `[box=#354920][img]https://www.upload.ee[/img][color=#FFFFFF]  LSSD > Программа «Возвращение домой»[/color][/box]
[b]Никнейм:[/b] ${v('nick')}
[b]Прошлый опыт:[/b] ${v('factions')}
[b]Желаемый отдел:[/b] ${v('rank')}
[b]Связь:[/b] ${v('social')}
[b]Доказательства:[/b] [url=${v('proofs')}]Клик[/url]
[hr][/hr]
[center]© 2024 Los Santos Sheriff Department[/center]`;

    const out = document.getElementById('output-box');
    out.innerText = bb;
    out.style.display = 'block';
}
</script>

</body>
</html>
