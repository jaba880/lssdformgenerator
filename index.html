<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0a0c0b; color: #fff; padding-bottom: 50px; }

        /* Твоя верхняя панель */
        .top-bar { background-color: #013220; height: 35px; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; border-bottom: 1px solid #c4a159; color: #fff; font-size: 12px; font-weight: bold; }
        .city-info { display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .city-logo { height: 14px; width: auto; } 
        .emergency-link { background: #000; color: #fff; text-decoration: underline; padding: 3px 10px; border-radius: 3px; font-weight: bold; }
        
        .main-header { background: linear-gradient(180deg, #013220 100%, #0d110e 0%); height: 100px; display: flex; align-items: center; padding: 0 50px; border-bottom: 3px solid #c4a159; }
        .brand-block { display: flex; align-items: center; gap: 20px; }
        .lssd-logo { height: 75px; }
        .separator { width: 1px; height: 50px; background: rgba(255,255,255,0.1); }
        .brand-text h1 { color: #fff; margin: 0; font-size: 22px; font-weight: 600; }
        .brand-text p { color: #8a918c; margin: 0; font-size: 13px; font-style: italic; }

        /* Конструктор */
        .constructor-container { max-width: 900px; margin: 60px auto; background: #0d110e; border: 1px solid #808080; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        .form-main-title { text-align: center; text-transform: uppercase; font-size: 18px; font-weight: bold; margin-bottom: 30px; letter-spacing: 1px; }
        .section-header { background: #013220; color: #fff; padding: 8px; font-size: 12px; font-weight: bold; text-transform: uppercase; text-align: center; margin: 25px 0 15px 0; border: 1px solid #c4a159; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; font-weight: bold; margin-bottom: 6px; color: #fff; text-transform: uppercase; }
        input, textarea { width: 100%; background: #1a1e1b; border: 1px solid #2a332d; color: #ccc; padding: 10px; box-sizing: border-box; font-size: 12px; outline: none; }
        .row { display: flex; gap: 20px; }
        .row .input-group { flex: 1; }

        /* Соглашение */
        .agreement-block { padding: 25px; margin-top: 30px; text-align: center; border-top: 1px solid #808080; }
        .agreement-text { font-size: 12px; line-height: 1.6; color: #ccc; margin-bottom: 20px; display: block; }
        .checkbox-container { display: inline-flex; align-items: center; gap: 10px; font-weight: bold; font-size: 12px; cursor: pointer; }
        
        .actions { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn { background: #121212; border: 1px solid #333; color: #fff; padding: 8px 30px; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: bold; }

        /* МОДАЛЬНОЕ ОКНО */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1c1c1c; width: 650px; padding: 20px; border-radius: 4px; border: 1px solid #333; }
        .modal-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .code-area { width: 100%; height: 250px; background: #000; color: #ccc; font-family: monospace; padding: 12px; border: 1px solid #333; resize: none; font-size: 12px; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn-forum { background: #0066cc; color: #fff; padding: 8px 15px; text-decoration: none; font-weight: bold; font-size: 13px; border-radius: 3px; }
        .btn-close { background: #444; color: #fff; border: none; padding: 8px 15px; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="city-info"><img src="https://sd.ls-services.ru" class="city-logo"> ЛОС-САНТОС</div>
        <div class="emergency">Для экстренных ситуаций: <a href="https://sd.ls-services.ru" class="emergency-link">Emergency services</a></div>
    </div>

    <header class="main-header">
        <div class="brand-block">
            <img src="https://sd.ls-services.ru" class="lssd-logo">
            <div class="separator"></div>
            <div class="brand-text"><h1>Департамент Шерифа Лос-Сантоса</h1><p>To Protect and to Serve</p></div>
        </div>
    </header>

    <div class="constructor-container">
        <div class="form-main-title">Программа «Возвращение домой»</div>

        <div class="section-header">1. ИНФОРМАЦИЯ О ПРОШЛЫХ МЕСТАХ ИГРЫ</div>
        <div class="input-group"><label>1.1. НИК-НЕЙМ:</label><input type="text" id="f11"></div>
        <div class="input-group"><label>1.2. ПРОЕКТЫ И ФРАКЦИИ:</label><textarea id="f12" rows="3"></textarea></div>
        <div class="input-group"><label>1.3. ЗВАНИЕ И ОТДЕЛ:</label><input type="text" id="f13"></div>
        <div class="input-group"><label>1.4. ПРИЧИНА УХОДА:</label><input type="text" id="f14"></div>

        <div class="section-header">2. ИНФОРМАЦИЯ О ПОДАЮЩЕМ ЗАЯВЛЕНИЕ</div>
        <div class="row">
            <div class="input-group"><label>2.1. ВОЗРАСТ:</label><input type="text" id="f21"></div>
            <div class="input-group"><label>2.2. ВК:</label><input type="text" id="f22"></div>
        </div>
        <div class="input-group"><label>2.3. КВЕНТА:</label><textarea id="f23" rows="3"></textarea></div>
        <div class="input-group"><label>2.4. ПЛАНЫ:</label><input type="text" id="f24"></div>
        <div class="input-group"><label>2.5. ПОЖЕЛАНИЯ:</label><input type="text" id="f25"></div>
        <div class="row">
            <div class="input-group"><label>2.6. ДОК-ВА:</label><input type="text" id="f26"></div>
            <div class="input-group"><label>2.7. ЗАЩИТА:</label><input type="text" id="f27"></div>
        </div>

        <div class="agreement-block">
            <span class="agreement-text">Я соглашаюсь со всеми правилами... (твой текст)</span>
            <label class="checkbox-container"><input type="checkbox" id="agree"> Я принимаю условия</label>
        </div>

        <div class="actions">
            <button class="btn" onclick="gen()">Сгенерировать</button>
            <button class="btn" onclick="location.reload()">Назад</button>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО -->
    <div id="m" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header"><h3>BBCode для копирования</h3><span onclick="closeM()" style="cursor:pointer">×</span></div>
            <textarea id="res" class="code-area" readonly></textarea>
            <div class="modal-footer">
                <button class="btn-close" onclick="closeM()">Закрыть</button>
                <a href="https://sd.ls-services.ru" target="_blank" class="btn-forum">На форум</a>
            </div>
        </div>
    </div>

    <script>
        function gen() {
            if(!document.getElementById('agree').checked) return alert("Сначала примите соглашение!");
            let bb = `[center][b]LSSD BACKHOME PROGRAM[/b][/center]\n\n`;
            bb += `[b]1.1. Ник:[/b] ${document.getElementById('f11').value}\n[b]1.2. Опыт:[/b] ${document.getElementById('f12').value}\n`;
            bb += `[b]1.3. Звание:[/b] ${document.getElementById('f13').value}\n[b]1.4. Причина:[/b] ${document.getElementById('f14').value}\n\n`;
            bb += `[b]2.1. Возраст:[/b] ${document.getElementById('f21').value}\n[b]2.2. ВК:[/b] ${document.getElementById('f22').value}\n`;
            bb += `[b]2.3. Квента:[/b] ${document.getElementById('f23').value}\n[b]2.4. Планы:[/b] ${document.getElementById('f24').value}\n`;
            bb += `[b]2.5. Пожелания:[/b] ${document.getElementById('f25').value}\n[b]2.6. Док-ва:[/b] ${document.getElementById('f26').value}\n`;
            bb += `[b]2.7. Защита:[/b] ${document.getElementById('f27').value}`;
            document.getElementById('res').value = bb;
            document.getElementById('m').style.display = 'flex';
        }
        function closeM() { document.getElementById('m').style.display = 'none'; }
    </script>
</body>
</html>
