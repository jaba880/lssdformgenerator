<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BackHome Construction</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 4px;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            font-size: 1.2em;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .section-title {
            background-color: #252525;
            padding: 5px 10px;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 15px;
            border-left: 3px solid #4a90e2;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.85em;
            margin-bottom: 5px;
            font-weight: bold;
            color: #bbb;
        }

        input, textarea {
            width: 100%;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: white;
            padding: 8px;
            box-sizing: border-box;
            outline: none;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        input:focus, textarea:focus {
            border-color: #4a90e2;
        }

        .row {
            display: flex;
            gap: 15px;
        }

        .row .form-group {
            flex: 1;
        }

        .agreement {
            font-size: 0.8em;
            background-color: #222;
            padding: 15px;
            border: 1px solid #333;
            margin-top: 20px;
            line-height: 1.4;
        }

        .checkbox-group {
            margin-top: 10px;
            display: flex;
            align-items: center;
            font-size: 0.85em;
        }

        .submit-btn {
            display: block;
            width: 200px;
            margin: 20px auto 0;
            padding: 10px;
            background-color: #4a4a4a;
            border: none;
            color: white;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }

        .submit-btn:hover {
            background-color: #5a5a5a;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Программа «Возвращение домой»</h2>

    <div class="section-title">1. ИНФОРМАЦИЯ О ПРОШЛЫХ МЕСТАХ ИГРЫ</div>
    
    <div class="form-group">
        <label>1.1. НИК-НЕЙМ ВАШЕГО ПРОШЛОГО ПЕРСОНАЖА:</label>
        <input type="text" placeholder="Введите ник...">
    </div>

    <div class="form-group">
        <label>1.2. ПРОЕКТЫ, СООБЩЕСТВА И ФРАКЦИИ, ГДЕ ВЫ ИГРАЛИ:</label>
        <textarea placeholder="Опишите ваш опыт..."></textarea>
    </div>

    <div class="section-title">2. ИНФОРМАЦИЯ О ПОДАЮЩЕМ ЗАЯВЛЕНИЕ</div>

    <div class="row">
        <div class="form-group">
            <label>2.1. ВАШ ВОЗРАСТ:</label>
            <input type="text" placeholder="Лет">
        </div>
        <div class="form-group">
            <label>2.2. ССЫЛКА НА ВК/ТГ:</label>
            <input type="text" placeholder="https://vk.com...">
        </div>
    </div>

    <div class="form-group">
        <label>2.3. КВЕНТА ВАШЕГО ПЕРСОНАЖА:</label>
        <textarea></textarea>
    </div>

    <div class="agreement">
        Я соглашаюсь, что если покину сообщество в течение испытательного срока без уважительной причины, то буду занесен в черный список... (текст из твоего скрина)
        <div class="checkbox-group">
            <input type="checkbox" id="agree">
            <label for="agree" style="display:inline; margin-left: 10px;">Я принимаю данные условия</label>
        </div>
    </div>

    <button class="submit-btn">Отправить заявку</button>
</div>

</body>
</html>
