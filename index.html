<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0a0c0b; }

        /* Верхняя панель (Тёмно-зеленый/черный) */
        .top-bar {
            background-color: #0b0f0d;
            height: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid #c4a159; /* Золотистая линия */
            color: #fff;
            font-size: 12px;
            font-weight: bold;
        }

        .city-info { display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .city-logo { height: 16px; width: auto; } /* Логотип города */

        .emergency { display: flex; align-items: center; gap: 10px; font-weight: normal; }
        .emergency-link {
            background: #000;
            color: #fff;
            text-decoration: none;
            padding: 3px 10px;
            border-radius: 3px;
            font-weight: bold;
            transition: 0.3s;
        }
        .emergency-link:hover { color: #c4a159; }

        /* Основной хедер (Тёмно-зелёный градиент как на sd.ls-services.ru) */
        .main-header {
            background: linear-gradient(180deg, #121814 0%, #0d110e 100%);
            height: 100px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            border-bottom: 3px solid #c4a159;
        }

        .brand-block { display: flex; align-items: center; gap: 20px; }
        .lssd-logo { height: 75px; }

        .separator { width: 1px; height: 50px; background: rgba(255,255,255,0.1); }

        .brand-text h1 { color: #fff; margin: 0; font-size: 22px; font-weight: 600; }
        .brand-text p { color: #8a918c; margin: 0; font-size: 13px; font-style: italic; }

        /* Навигация */
        .nav-menu { margin-left: auto; }
        .nav-item {
            color: #fff;
            text-decoration: none;
            background: #1a231e; /* Темно-зеленая подложка кнопки */
            padding: 12px 25px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-radius: 4px 4px 0 0;
            border-bottom: 3px solid #c4a159;
            margin-bottom: -33px; /* Прижимаем к золотой линии */
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="city-info">
            <!-- Заменил иконку на логотип звезды -->
            <img src="https://sd.ls-services.ru/images/ranksOCT19/Logos/SIBLogo.png" class="city-logo" alt="">
            ЛОС-САНТОС
        </div>
        <div class="emergency">
            Для экстренных ситуаций: 
            <a href="https://sd.ls-services.ru/viewforum.php?f=4" class="emergency-link">Emergency services</a>
        </div>
    </div>

    <header class="main-header">
        <div class="brand-block">
            <img src="https://sd.ls-services.ru/images/ranksOCT19/Logos/LSSDLogo.png" class="lssd-logo" alt="LSSD">
            <div class="separator"></div>
            <div class="brand-text">
                <h1>Департамент Шерифа Лос-Сантоса</h1>
                <p>To Protect and to Serve</p>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item">
                <i class="fas fa-users"></i> Гражданам
            </a>
        </nav>
    </header>

</body>
</html>
