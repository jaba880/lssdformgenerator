<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        :root {
            --main-bg: #1a1f1c; /* Чуть светлее для читаемости */
            --block-bg: #0d110e; /* Темно-зеленый */
            --accent: #c4a159;   /* Золотой */
            --text: #ffffff;
            --input-bg: #141815;
        }

        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: var(--main-bg); color: var(--text); padding-bottom: 50px; }

        /* Хедеры из твоего кода */
        .top-bar { background-color: #0b0f0d; height: 35px; display: flex; justify-content: space-between; align-items: center; padding: 0 50px; border-bottom: 1px solid var(--accent); font-size: 12px; font-weight: bold; }
        .city-info { display: flex; align-items: center; gap: 8px; text-transform: uppercase; }
        .city-logo { height: 14px; }
        .emergency-link { background: #000; color: #fff; text-decoration: none; padding: 3px 10px; border-radius: 3px; border: 1px solid #222; }
        
        .main-header { background: linear-gradient(180deg, #121814 0%, #0d110e 100%); height: 100px; display: flex; align-items: center; padding: 0 50px; border-bottom: 3px solid var(--accent); }
        .brand-block { display: flex; align-items: center; gap: 20px; }
        .lssd-logo { height: 75px; }
        .separator { width: 1px; height: 50px; background: rgba(255,255,255,0.1); }
        .brand-text h1 { margin: 0; font-size: 22px; }
        .brand-text p { color: #8a918c; margin: 0; font-size: 13px; font-style: italic; }

        /* Конструктор */
        .constructor-container {
            max-width: 900px; margin: 40px auto; background: var(--block-bg);
            border: 1px solid #2a332d; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .section-header { background: #0d1a2b; padding: 10px; font-size: 12px; text-transform: uppercase; text-align: center; margin: 25px 0 15px; border: 1px solid #1e3a5f; font-weight: bold; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 11px; margin-bottom: 6px; color: #c4a159; font-weight: bold; }

        input, textarea { width: 100%; background: var(--input-bg); border: 1px solid #2a332d; color: #fff; padding: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }

        .row { display: flex; gap: 20px; }
        .row .input-group { flex: 1; }

        /* Соглашение */
        .agreement-block { padding: 25px; margin: 30px 0; text-align: center; border: 1px dashed #2a332d; }
        .agreement-text { font-size: 13px; line-height: 1.6; color: #ccc; margin-bottom: 15px; display: block; }
        
        /* Модальное окно (как на скрине) */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 600px; padding: 20px; border-radius: 5px; border: 1px solid #333; position: relative; }
        .modal-header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .modal-close { cursor: pointer; color: #666; }
        
        .code-area { width: 100%; height: 200px; background: #000; color: #0f0; font-family: monospace; padding: 10px; resize: none; font-size: 12px; border: 1px solid #333; }
        
        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
        .btn-forum { background: #0066cc; color: white; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; text-decoration: none; font-size: 13px; }
        .btn-close { background: #444; color: white; border: none; padding: 8px 15px; cursor: pointer; }

        .btn-generate { background: var(--accent); color: #000; border: none; padding: 12px 40px; font-weight: bold; cursor: pointer; text-transform: uppercase; display: block; margin: 0 auto; transition: 0.3s; }
        .btn-generate:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(196,161,89,0.4); }
    </style>
</head>
<body>

    <!-- Шапка без изменений ссылок -->
    <div class="top-bar">
        <div class="city-info"><img src="https://sd.ls-services.ru" class="city-logo"> ЛОС-САНТОС</div>
        <div class="emergency">Для экстренных ситуаций: <a href="https://sd.ls-services.ru" class="emergency-link">Emergency services</a></div>
    </div>

    <header class="main-header">
        <div class="brand-block">
            <img src="https://sd.ls-services.ru" class="lssd-logo">
            <div class="separator"></div>
            <div class="brand-text"><h1>Департамент Шерифа Лос-Сантоса</h1><p>To Protect and to Serve</p></div>
        </div>
    </header>

    <div class="constructor-container">
        <div class="section-header">1. ИНФОРМАЦИЯ О ПРОШЛОМ ОПЫТЕ</div>
        <div class="input-group"><label>1.1. НИК-НЕЙМ:</label><input type="text" id="f11"></div>
        <div class="input-group"><label>1.2. ГДЕ ИГРАЛИ:</label><textarea id="f12" rows="3"></textarea></div>

        <div class="section-header">2. ЛИЧНАЯ ИНФОРМАЦИЯ</div>
        <div class="row">
            <div class="input-group"><label>2.1. ВОЗРАСТ:</label><input type="text" id="f21"></div>
            <div class="input-group"><label>2.2. ВК/ТГ:</label><input type="text" id="f22"></div>
        </div>

        <div class="agreement-block">
            <span class="agreement-text">Я соглашаюсь со всеми правилами и условиями... (ваш текст)</span>
            <label style="cursor:pointer; font-weight:bold;"><input type="checkbox" id="agreeCheck"> Я принимаю условия</label>
        </div>

        <button class="btn-generate" onclick="generateBB()">Сгенерировать</button>
    </div>

    <!-- Модальное окно (Окно с кодом) -->
    <div id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <span style="font-weight:bold;">BBCode для копирования</span>
                <span class="modal-close" onclick="closeModal()">×</span>
            </div>
            <label style="font-size:12px; color:#888;">Код</label>
            <textarea class="code-area" id="resultCode" readonly></textarea>
            <div class="modal-actions">
                <button class="btn-close" onclick="closeModal()">Закрыть</button>
                <a href="https://sd.ls-services.ru/posting.php?mode=post&f=13" target="_blank" class="btn-forum">На форум</a>
            </div>
        </div>
    </div>

    <script>
        function generateBB() {
            const isAgreed = document.getElementById('agreeCheck').checked;
            
            if (!isAgreed) {
                alert("Сначала примите соглашение!");
                return;
            }

            // Собираем данные
            const nick = document.getElementById('f11').value;
            const exp = document.getElementById('f12').value;
            const age = document.getElementById('f21').value;
            const link = document.getElementById('f22').value;

            // Формируем BB-код
            let bb = `[center][b]ДЕПАРТАМЕНТ ШЕРИФА ЛОС-САНТОСА[/b]\n`;
            bb += `[b]ПРОГРАММА ВОЗВРАЩЕНИЯ ДОМОЙ[/b][/center]\n\n`;
            bb += `[b]1.1. Ник:[/b] ${nick}\n`;
            bb += `[b]1.2. Опыт:[/b] ${exp}\n`;
            bb += `[b]2.1. Возраст:[/b] ${age}\n`;
            bb += `[b]2.2. Связь:[/b] ${link}\n`;
            bb += `\n[i]Соглашение принято.[/i]`;

            document.getElementById('resultCode').value = bb;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }
    </script>
</body>
</html>
