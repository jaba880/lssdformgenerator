<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSSD - Backhome Constructor</title>
    <style>
        :root {
            --lssd-green: #354920;
            --section-blue: #0d1a2a;
            --section-text: #4a9eff;
            --bg-main: #080808;
            --bg-panel: #111111;
            --input-bg: #0a0a0a;
            --border: #222222;
        }

        body { margin: 0; background-color: var(--bg-main); color: #fff; font-family: 'Arial', sans-serif; }

        /* ВЕРХНИЙ БАР */
        .top-bar {
            background-color: #0a111a;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid #1a2a3a;
        }
        .top-bar-left { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .top-bar-left img { width: 14px; height: 14px; }
        .top-bar-right { color: #888; font-size: 10px; }

        /* ХЕДЕР */
        .main-header {
            background-color: #0d0d0d;
            height: 90px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid #1a1a1a;
        }
        .header-logo { width: 50px; height: auto; margin-right: 20px; }
        .header-text { border-left: 1px solid #222; padding-left: 20px; }
        .header-text h1 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        .header-text p { margin: 2px 0 0; color: #555; font-size: 10px; font-style: italic; }

        /* КОНСТРУКТОР */
        .main-wrapper { width: 800px; margin: 30px auto; background: var(--bg-panel); border: 1px solid var(--border); box-shadow: 0 0 20px #000; }
        .main-title { padding: 20px; text-align: center; font-size: 14px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }

        .section-bar {
            background-color: var(--section-blue);
            color: var(--section-text);
            text-align: center;
            padding: 8px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            border-top: 1px solid #1a2a3a;
            border-bottom: 1px solid #1a2a3a;
        }

        .form-body { padding: 25px; }
        label { display: block; font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; margin-bottom: 6px; }
        
        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #222;
            color: #ccc;
            padding: 10px;
            box-sizing: border-box;
            font-size: 11px;
            outline: none;
            margin-bottom: 15px;
        }
        input:focus, textarea:focus { border-color: var(--lssd-green); }
        textarea { height: 60px; resize: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        /* СОГЛАШЕНИЕ */
        .agreement-area { padding: 0 25px 25px; text-align: center; }
        .check-group { display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: #fff; }
        .check-group input { width: 18px; height: 18px; cursor: pointer; }

        /* КНОПКИ */
        .footer-btns { display: flex; justify-content: center; gap: 10px; padding-bottom: 30px; }
        .btn { background: #000; border: 1px solid #222; color: #fff; padding: 10px 30px; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; border-radius: 4px; }
        .btn:hover { border-color: var(--lssd-green); }

        /* МОДАЛКА */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 999; align-items: center; justify-content: center; }
        .modal-card { background: #151515; width: 550px; border: 1px solid #333; padding: 25px; box-shadow: 0 0 40px #000; }
        .btn-blue { background: #0060df; border: none; padding: 12px 25px; color: #fff; font-weight: bold; cursor: pointer; float: right; margin-top: 15px; border-radius: 3px; }
        .btn-blue:hover { background: #0050c0; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left"><img src="https://www.upload.ee"> ЛОС-САНТОС</div>
        <div class="top-bar-right">📞 Для экстренных ситуаций: <b style="color:#fff">Emergency Services</b></div>
    </div>

    <div class="main-header">
        <img src="https://www.upload.ee" class="header-logo">
        <div class="header-text">
            <h1>ДЕПАРТАМЕНТ ШЕРИФА ЛОС-САНТОСА</h1>
            <p>To Serve and Protect</p>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="main-title">ПРОГРАММА «ВОЗВРАЩЕНИЕ ДОМОЙ»</div>

        <div class="section-bar">1. Информация о персонаже и опыте</div>
        <div class="form-body">
            <label>1.1. Фракции в которых состояли:</label>
            <textarea id="factions" placeholder="Никнейм, проект, должность, причины и даты ухода"></textarea>
            
            <label>1.2. Доказательства игры (СС):</label>
            <input type="text" id="proofs" placeholder="Вставьте ссылки">
            
            <label>1.3. Планируемая роль во фракции (3-4 предложения):</label>
            <textarea id="role" placeholder="Описание вашего будущего персонажа"></textarea>
            
            <label>1.4. Список пожеланий, комментарий:</label>
            <input type="text" id="comments">
        </div>

        <div class="section-bar">2. OOC Данные</div>
        <div class="form-body">
            <div class="grid-2">
                <div><label>2.1. Имя:</label><input type="text" id="o_name"></div>
                <div><label>2.2. Возраст:</label><input type="text" id="o_age"></div>
            </div>
            <div class="grid-2">
                <div><label>2.3. TG Nickname:</label><input type="text" id="o_tg"></div>
                <div><label>2.4. Ссылка на Google Auth:</label><input type="text" id="o_ga"></div>
            </div>
        </div>

        <div class="agreement-area">
            <div class="check-group">
                <input type="checkbox" id="agree">
                <span>Я принимаю условия данного заявления</span>
            </div>
        </div>

        <div class="footer-btns">
            <button class="btn" onclick="generate()">Сгенерировать</button>
            <button class="btn" style="color:#555" onclick="location.reload()">Очистить</button>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin:0 0 15px; font-size:14px; border-bottom:1px solid #222; padding-bottom:10px;">ГОТОВЫЙ BB-CODE</h3>
            <textarea id="output-code" readonly style="width:100%; height:250px; background:#000; color:#0f0; border:1px solid #333; font-family:monospace; font-size:11px;"></textarea>
            <button class="btn-blue" onclick="copyAndPost()">Копировать и на форум</button>
            <button class="btn" style="margin-top:15px; min-width:100px;" onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        function generate() {
            if(!document.getElementById('agree').checked) { alert("Примите условия!"); return; }
            
            const v = (id) => document.getElementById(id).value || "Заполнить";
            const tg = v('o_tg');

            const bb = `[box=#354920][img]https://www.upload.ee[/img][color=#FFFFFF]  Департамент шерифа Лос Сантоса > Карьера > Программа «Возвращение домой»[/color][/box]
[b][size=115][border=#354920]Заявление[/border][/size][/b]
[list=1][*][b]Фракции в которых состояли ([i]Никнейм, проект, должность, причины и даты ухода[/i]):[/b] ${v('factions')}
[*][b]Доказательства игры [i](СС, не обязательно за копов)[/i]:[/b] ${v('proofs')}
[*][b]Планируемая роль во фракции:[/b]
[spoiler="Роль"]${v('role')}[/spoiler]
[*][b]Список пожеланий, комментарий:[/b] ${v('comments')}

[*][b]Имя:[/b] ${v('o_name')}
[*][b]Возраст:[/b] ${v('o_age')} лет
[*][b]Ссылка на аккаунт в TG:[/b] [url=https://t.me{tg}]${tg}[/url]
[*][b]Скриншот включенного Google Authenticator (без каких-либо обработок):[/b] [url=${v('o_ga')}]Ссылка на скриншот[/url][/list]

[hr][/hr]
[b][size=115][border=#354920]Соглашение[/border][/size][/b]
[list][b]Отправляя это заявление, вы автоматически соглашаетесь с приведенным ниже соглашением:[/b]

[list][i] [justify]Я соглашаюсь со всеми правилами и условиями полицейского департамента. Также уверяю, что все данные мною ответы в этой заявке являются правдивыми, и я не имею конфликтов с полицейским департаментом и не состою в черном списке сообщества. Я согласен быть активным с аккаунта полицейского больше, чем с каких-либо других имеющихся у меня аккаунтов.[/justify][/i][/list][/list]

[box=#354920][color=#FFFFFF][size=85][center]© 2024. Департамент шерифа округа Лос-Сантос. Все права защищены.[/center][/size][/color][/box]`;
            
            document.getElementById('output-code').value = bb;
            document.getElementById('modal').style.display = 'flex';
        }

        function copyAndPost() {
            const code = document.getElementById('output-code');
            code.select();
            document.execCommand('copy');
            window.location.href = 'https://sd.ls-services.ru/posting.php?mode=post&f=13';
        }
    </script>
</body>
</html>
