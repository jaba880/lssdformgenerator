<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial, sans-serif; background: #0b0b0b; }

        /* Верхняя тонкая панель */
        .top-bar {
            background-color: #0d1421;
            height: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            border-bottom: 1px solid #9c7e3a; /* Золотистая тонкая линия */
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .city-info { display: flex; align-items: center; gap: 8px; }
        
        .emergency { display: flex; align-items: center; gap: 5px; font-weight: normal; text-transform: none; }
        .emergency b { 
            background: #000; 
            padding: 2px 8px; 
            border-radius: 3px; 
            margin-left: 5px; 
            color: #fff;
        }

        /* Основной хедер */
        .main-header {
            background-color: #161616;
            height: 100px;
            display: flex;
            align-items: center;
            padding: 0 60px;
            border-bottom: 3px solid #9c7e3a; /* Толстая золотая линия */
        }

        /* Блок с лого и текстом */
        .brand-block {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .lssd-logo {
            height: 75px; /* Размер звезды шерифа */
        }

        .separator {
            width: 1px;
            height: 50px;
            background: #444;
        }

        .brand-text h1 {
            color: #fff;
            margin: 0;
            font-size: 22px;
            letter-spacing: 0.5px;
        }

        .brand-text p {
            color: #777;
            margin: 0;
            font-size: 13px;
            font-style: italic;
        }

        /* Навигация */
        .nav-menu {
            display: flex;
            margin-left: auto;
            gap: 5px;
        }

        .nav-item {
            color: #bbb;
            text-decoration: none;
            padding: 12px 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            border-bottom: 3px solid transparent;
            margin-bottom: -33px; /* Чтобы линия ложилась на границу хедера */
        }

        /* Активный пункт как на скрине */
        .nav-item.active {
            color: #fff;
            background: #1a2436; /* Синеватая подложка */
            border-radius: 4px 4px 0 0;
            border-bottom: 3px solid #9c7e3a; /* Золотая черта под кнопкой */
        }

        .nav-item:hover:not(.active) {
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="city-info">
            <i class="fas fa-star" style="color: #9c7e3a; font-size: 12px;"></i> ЛОС-САНТОС
        </div>
        <div class="emergency">
            <i class="fas fa-phone-alt"></i> Для экстренных ситуаций: <b>Emergency services</b>
        </div>
    </div>

    <header class="main-header">
        <div class="brand-block">
            <!-- Сюда вставь прямую ссылку на прозрачное лого LSSD -->
            <img src="https://sd.ls-services.ru/images/ranksOCT19/Logos/LSSDLogo.png" class="lssd-logo" alt="LSSD">
            <div class="separator"></div>
            <div class="brand-text">
                <h1>Департамент Шерифа Лос-Сантоса</h1>
                <p>To Protect and to Serve</p>
            </div>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-item">
                <i class="fas fa-shield-alt"></i> Офицерам
            </a>
            <a href="#" class="nav-item active">
                <i class="fas fa-users"></i> Гражданам
            </a>
            <a href="#" class="nav-item">
                <i class="fas fa-file-invoice"></i> Инспекторам ОВР
            </a>
        </nav>
    </header>

</body>
</html>
