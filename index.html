<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSSD - Backhome Constructor</title>
    <style>
        :root {
            --lssd-green: #354920;
            --section-blue: #233142; /* Мягкий синий */
            --section-text: #6baaff; /* Светло-голубой */
            --bg-main: #1a1a1a;      /* Фон как на форуме */
            --bg-panel: #212121;     /* Чуть светлее для блоков */
            --input-bg: #161616;
            --border: #333;
        }

        body { margin: 0; background-color: var(--bg-main); color: #e0e0e0; font-family: 'Arial', sans-serif; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            background-color: #121820;
            height: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            border-bottom: 1px solid #2d3b4d;
        }
        .top-bar-left { display: flex; align-items: center; gap: 10px; color: #ccc; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .top-bar-left img { width: 16px; height: 16px; opacity: 0.8; }
        
        .emergency-link { 
            color: #aaa; 
            font-size: 11px; 
            text-decoration: underline; 
            font-weight: bold;
            cursor: pointer;
        }
        .emergency-link:hover { color: #fff; }

        /* ХЕДЕР */
        .main-header {
            background-color: #1f1f1f;
            height: 100px;
            display: flex;
            align-items: center;
            padding: 0 60px;
            border-bottom: 1px solid var(--border);
        }
        .header-logo { width: 60px; margin-right: 25px; }
        .header-text { border-left: 2px solid #333; padding-left: 25px; }
        .header-text h1 { margin: 0; font-size: 22px; text-transform: uppercase; color: #eee; }
        .header-text p { margin: 4px 0 0; color: #777; font-size: 11px; font-style: italic; }

        /* КОНТЕЙНЕР */
        .main-wrapper { 
            width: 900px; 
            margin: 40px auto; 
            background: var(--bg-panel); 
            border: 1px solid var(--border); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .main-title { padding: 30px; text-align: center; font-size: 16px; font-weight: bold; text-transform: uppercase; color: #fff; }

        .section-bar {
            background-color: var(--section-blue);
            color: var(--section-text);
            text-align: center;
            padding: 10px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            border-top: 1px solid #2d3b4d;
            border-bottom: 1px solid #2d3b4d;
        }

        .form-body { padding: 35px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; margin-bottom: 8px; }
        
        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #3a3a3a;
            color: #ddd;
            padding: 14px;
            box-sizing: border-box;
            font-size: 13px;
            outline: none;
            margin-bottom: 20px;
        }
        input:focus { border-color: var(--lssd-green); background: #1a1a1a; }
        textarea { height: 90px; resize: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* КНОПКИ */
        .footer-btns { display: flex; justify-content: center; gap: 15px; padding-bottom: 50px; }
        .btn { background: #2a2a2a; border: 1px solid #444; color: #fff; padding: 14px 45px; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn:hover { background: var(--lssd-green); border-color: var(--lssd-green); }

        /* МОДАЛКА */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: #252525; width: 650px; border: 1px solid #444; padding: 30px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left"><img src="https://www.upload.ee"> ЛОС-САНТОС</div>
        <a href="https://sd.ls-services.ru" target="_blank" class="emergency-link">Для экстренных</a>
    </div>

    <div class="main-header">
        <img src="https://www.upload.ee" class="header-logo">
        <div class="header-text">
            <h1>ДЕПАРТАМЕНТ ШЕРИФА ЛОС-САНТОСА</h1>
            <p>To Serve and Protect</p>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="main-title">ПРОГРАММА «ВОЗВРАЩЕНИЕ ДОМОЙ»</div>

        <div class="section-bar">1. Информация о персонаже и опыте</div>
        <div class="form-body">
            <label>1.1. Фракции в которых состояли:</label>
            <textarea id="factions" placeholder="Никнейм, проект, ранг..."></textarea>
            
            <label>1.2. Доказательства игры (СС):</label>
            <input type="text" id="proofs" placeholder="Ссылки на скриншоты">
            
            <label>1.3. Планируемая роль (3-4 предложения):</label>
            <textarea id="role" placeholder="Описание персонажа..."></textarea>
        </div>

        <div class="section-bar">2. OOC ИНФОРМАЦИЯ</div>
        <div class="form-body">
            <div class="grid-2">
                <div><label>2.1. Имя:</label><input type="text" id="o_name"></div>
                <div><label>2.2. Возраст:</label><input type="text" id="o_age"></div>
            </div>
            <div class="grid-2">
                <div><label>2.3. TG Nickname:</label><input type="text" id="o_tg"></div>
                <div><label>2.4. Ссылка на Google Auth:</label><input type="text" id="o_ga"></div>
            </div>
        </div>

        <div class="footer-btns">
            <button class="btn" onclick="generate()">Сгенерировать</button>
            <button class="btn" style="background:#1a1a1a; color:#666;" onclick="location.reload()">Очистить</button>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin:0 0 20px; font-size:14px; border-bottom:1px solid #444; padding-bottom:10px;">BB-CODE ЗАЯВЛЕНИЯ</h3>
            <textarea id="output-code" readonly style="width:100%; height:250px; background:#161616; color:#0f0; border:1px solid #333; font-family:monospace; padding:10px;"></textarea>
            <button class="btn" style="background:#0060df; border:none; margin-top:20px; float:right;" onclick="copyAndPost()">Копировать и на форум</button>
            <button class="btn" style="margin-top:20px;" onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        function generate() {
            const v = (id) => document.getElementById(id).value || "Заполнить";
            const bb = `[box=#354920][img]https://www.upload.ee[/img][color=#FFFFFF]  LSSD > Backhome Program[/color][/box]\n[b]Фракции:[/b] ${v('factions')}\n[b]Доказательства:[/b] ${v('proofs')}\n[b]TG:[/b] ${v('o_tg')}`;
            
            document.getElementById('output-code').value = bb;
            document.getElementById('modal').style.display = 'flex';
        }

        function copyAndPost() {
            const code = document.getElementById('output-code');
            code.select();
            document.execCommand('copy');
            window.location.href = 'https://sd.ls-services.ru';
        }
    </script>
</body>
</html>
