<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LSSD - BackHome Generator</title>
    <style>
        /* Стили для новой шапки в стиле скриншота */
        .top-bar {
            background-color: #001a33;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            border-bottom: 1px solid #002b55;
        }
        .main-header {
            background-color: #111;
            color: white;
            display: flex;
            align-items: center;
            padding: 15px 40px;
            border-bottom: 2px solid #b8860b;
        }
        .header-logo-section {
            display: flex;
            align-items: center;
            border-right: 1px solid #333;
            padding-right: 20px;
            margin-right: 20px;
        }
        .header-logo-section img {
            width: 50px;
            margin-right: 15px;
        }
        .header-title h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: 1px;
        }
        .header-title span {
            font-size: 10px;
            color: #888;
            font-style: italic;
        }
        .emergency-link-top {
            color: white;
            text-decoration: none;
        }
        .emergency-link-top span {
            background: #b8860b;
            padding: 2px 6px;
            border-radius: 3px;
            margin-left: 5px;
        }

        /* Твои оригинальные стили ниже (без изменений) */
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; }
        .container { max-width: 900px; margin: 20px auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn { background-color: #004a99; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn:hover { background-color: #003366; }
        #output { margin-top: 20px; white-space: pre-wrap; background: #f9f9f9; padding: 15px; border: 1px solid #ddd; position: relative; }
    </style>
</head>
<body>

<!-- НОВЫЙ БЛОК ШАПКИ -->
<div class="top-bar">
    <div>
        <img src="https://upload.wikimedia.org" style="vertical-align: middle; margin-right: 5px;">
        ЛОС-САНТОС
    </div>
    <span class="emergency-link-top">Для экстренных ситуаций: <span>911</span></span>
</div>

<div class="main-header">
    <div class="header-logo-section">
        <img src="https://upload.wikimedia.org" alt="Logo">
        <div class="header-title">
            <h2>Департамент Шерифа Лос-Сантос</h2>
            <span>Oro en paz, fierro en guerra</span>
        </div>
    </div>
    <div style="font-size: 13px; color: #ccc; display: flex; gap: 20px;">
        <span>Офицерам</span>
        <span style="border-bottom: 2px solid #b8860b; color: white;">Гражданам</span>
        <span>Инспекторам ОВР</span>
    </div>
</div>

<!-- ТВОЙ КОНТЕЙНЕР И ФОРМА -->
<div class="container">
    <h2 style="text-align: center;">Конструктор BackHome</h2>
    <form id="bh-form">
        <!-- Твои поля формы (я сократил для примера, вставь сюда свои из index.html) -->
        <div class="form-group">
            <label>Игровой никнейм:</label>
            <input type="text" id="nickname" placeholder="Nick_Name">
        </div>
        <button type="button" class="btn" onclick="generate()">Сгенерировать</button>
    </form>
    
    <div id="output">Результат появится здесь...</div>
</div>

<script>
    // Твоя функция генерации остается без изменений
    function generate() {
        // Твой JS код из репозитория
    }
</script>

</body>
</html>
