<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSSD - Backhome Constructor</title>
    <style>
        :root {
            --lssd-green: #354920;
            --lssd-dark: #1a2412;
            --bg-main: #1a1a1a;
            --bg-panel: #212121;
            --input-bg: #141414;
            --border: #333;
        }

        body { margin: 0; background-color: var(--bg-main); color: #ccc; font-family: 'Arial', sans-serif; }

        /* ВЕРХНЯЯ ПАНЕЛЬ */
        .top-bar {
            background-color: #0d1218;
            height: 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            border-bottom: 1px solid #1a242f;
        }
        .top-bar-left { display: flex; align-items: center; gap: 10px; color: #fff; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .top-bar-left img { width: 18px; height: 18px; }
        
        /* ССЫЛКА ДЛЯ ЭКСТРЕННЫХ */
        .emergency-link { 
            color: #fff; 
            font-size: 11px; 
            text-decoration: underline; 
            font-weight: bold; 
            cursor: pointer;
            transition: 0.2s;
        }
        .emergency-link:hover { color: #cc0000; }

        /* ХЕДЕР С УВЕЛИЧЕННЫМ ЛОГО */
        .main-header {
            background-color: #1f1f1f;
            height: 110px;
            display: flex;
            align-items: center;
            padding: 0 60px;
            border-bottom: 1px solid var(--lssd-green);
        }
        .header-logo { width: 80px; height: auto; margin-right: 30px; }
        .header-text { border-left: 2px solid var(--lssd-green); padding-left: 30px; }
        .header-text h1 { margin: 0; font-size: 22px; text-transform: uppercase; color: #fff; letter-spacing: 1px; }
        .header-text p { margin: 4px 0 0; color: #666; font-size: 11px; font-style: italic; text-transform: uppercase; }

        /* ОСНОВНОЙ БЛОК */
        .main-wrapper { 
            width: 850px; 
            margin: 40px auto; 
            background: var(--bg-panel); 
            border: 1px solid var(--border); 
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        .main-title { padding: 25px; text-align: center; font-size: 15px; font-weight: bold; text-transform: uppercase; color: #fff; letter-spacing: 2px; }

        .section-bar {
            background-color: var(--lssd-green);
            color: #fff;
            text-align: center;
            padding: 10px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            border-top: 1px solid #4a632d;
            border-bottom: 1px solid #1e2912;
        }

        .form-body { padding: 35px; }
        label { display: block; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 8px; }
        
        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #3a3a3a;
            color: #eee;
            padding: 12px;
            box-sizing: border-box;
            font-size: 13px;
            outline: none;
            margin-bottom: 20px;
        }
        input:focus { border-color: var(--lssd-green); }
        textarea { height: 100px; resize: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* КНОПКИ */
        .footer-btns { display: flex; justify-content: center; gap: 15px; padding-bottom: 40px; }
        .btn { background: #111; border: 1px solid #444; color: #fff; padding: 12px 40px; font-size: 12px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-gen { background: var(--lssd-green); border-color: var(--lssd-green); }

        /* МОДАЛКА */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal-card { background: #252525; width: 650px; border: 1px solid var(--lssd-green); padding: 30px; }
        .btn-blue { background: #0060df; border: none; padding: 12px 30px; color: #fff; font-weight: bold; cursor: pointer; float: right; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-left"><img src="https://www.upload.ee"> ЛОС-САНТОС</div>
        <!-- ПЕРЕХОД ДЛЯ ЭКСТРЕННЫХ -->
        <a href="https://sd.ls-services.ru" target="_blank" class="emergency-link">Для экстренных</a>
    </div>

    <div class="main-header">
        <img src="https://www.upload.ee" class="header-logo">
        <div class="header-text">
            <h1>ДЕПАРТАМЕНТ ШЕРИФА ЛОС-САНТОСА</h1>
            <p>To Serve and Protect</p>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="main-title">ПРОГРАММА «ВОЗВРАЩЕНИЕ ДОМОЙ»</div>

        <div class="section-bar">1. Информация о персонаже и опыте</div>
        <div class="form-body">
            <label>1.1. Фракции в которых состояли:</label>
            <textarea id="factions" placeholder="Никнейм, проект, должность, причины и даты ухода"></textarea>
            
            <label>1.2. Доказательства игры (СС):</label>
            <input type="text" id="proofs" placeholder="Ссылки на скриншоты">
            
            <label>1.3. Планируемая роль во фракции (3-4 предложения):</label>
            <textarea id="role" placeholder="Описание вашего будущего персонажа"></textarea>

            <label>1.4. Список пожеланий, комментарий:</label>
            <input type="text" id="wish">
        </div>

        <div class="section-bar">2. Информация о подающем заявление</div>
        <div class="form-body">
            <div class="grid-2">
                <div><label>Имя (OOC):</label><input type="text" id="o_name"></div>
                <div><label>Возраст:</label><input type="text" id="o_age"></div>
            </div>
            <div class="grid-2">
                <div><label>Telegram (без @):</label><input type="text" id="o_tg"></div>
                <div><label>Ссылка на скриншот GA:</label><input type="text" id="o_ga"></div>
            </div>
        </div>

        <div class="footer-btns">
            <button class="btn btn-gen" onclick="generate()">Сгенерировать</button>
            <button class="btn" style="color:#666" onclick="location.reload()">Назад</button>
        </div>
    </div>

    <!-- МОДАЛКА -->
    <div id="modal" class="modal-overlay">
        <div class="modal-card">
            <h3 style="margin:0 0 20px; font-size:14px; border-bottom:1px solid #444; padding-bottom:10px; text-transform:uppercase;">ГОТОВЫЙ BB-CODE</h3>
            <textarea id="output-code" readonly style="width:100%; height:300px; background:#111; color:#8fbc8f; border:1px solid #333; font-family:monospace; padding:10px; font-size:11px; line-height:1.5;"></textarea>
            <button class="btn-blue" onclick="copyAndPost()">Копировать и на форум</button>
            <button class="btn" style="margin-top:20px;" onclick="document.getElementById('modal').style.display='none'">Закрыть</button>
        </div>
    </div>

    <script>
        function generate() {
            const v = (id) => document.getElementById(id).value || "Заполнить";
            const tg = v('o_tg');

            // ТВОЙ ИДЕАЛЬНЫЙ ШАБЛОН BB-КОДА
            const bb = `[box=#354920][img]https://www.upload.ee[/img][color=#FFFFFF]  Департамент шерифа Лос Сантоса > Карьера > Программа «Возвращение домой»[/color][/box]
[b][size=115][border=#354920]Заявление[/border][/size][/b]
[list=1][*][b]Фракции в которых состояли ([i]Никнейм, проект, должность, причины и даты ухода[/i]):[/b] ${v('factions')}
[*][b]Доказательства игры [i](СС, не обязательно за копов)[/i]:[/b] ${v('proofs')}
[*][b]Планируемая роль во фракции:[/b]
[spoiler="Роль"]${v('role')}[/spoiler]
[*][b]Список пожеланий, комментарий:[/b] ${v('wish')}

[*][b]Имя:[/b] ${v('o_name')}
[*][b]Возраст:[/b] ${v('o_age')}
[*][b]Ссылка на аккаунт в TG:[/b] [url=https://t.me{tg}]${tg}[/url]
[*][b]Скриншот включенного Google Authenticator (без каких-либо обработок):[/b] [url=${v('o_ga')}]Ссылка на скриншот[/url][/list]

[hr][/hr]
[b][size=115][border=#354920]Соглашение[/border][/size][/b]
[list][b]Отправляя это заявление, вы автоматически соглашаетесь с приведенным ниже соглашением:[/b]

[list][i] [justify]Я соглашаюсь со всеми правилами и условиями полицейского департамента. Также уверяю, что все данные мною ответы в этой заявке являются правдивыми, и я не имею конфликтов с полицейским департаментом и не состою в черном списке сообщества. Я согласен быть активным с аккаунта полицейского больше, чем с каких-либо других имеющихся у меня аккаунтов.[/justify][/i][/list][/list]

[box=#354920][color=#FFFFFF][size=85][center]© 2024. Департамент шерифа округа Лос-Сантос. Все права защищены.[/center][/size][/color][/box]`;
            
            document.getElementById('output-code').value = bb;
            document.getElementById('modal').style.display = 'flex';
        }

        function copyAndPost() {
            const code = document.getElementById('output-code');
            code.select();
            document.execCommand('copy');
            // ПЕРЕХОД В РАЗДЕЛ СОЗДАНИЯ ТЕМЫ
            window.location.href = 'https://sd.ls-services.ru';
        }
    </script>
</body>
</html>
