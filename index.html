<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com">
    <title>LSSD - Back Home Program</title>
    <style>
        :root { --lssd-main: #354920; --dark-ui: #0b0e11; }
        body { background-color: var(--dark-ui); color: #4dc2bb; font-family: 'Segoe UI', sans-serif; padding-top: 20px; }
        
        /* Шапка LSSD */
        .header-lssd { background: #000; border-bottom: 2px solid var(--lssd-main); padding: 15px 0; margin-bottom: 30px; }
        .dept-name { color: var(--lssd-main); font-weight: 800; text-transform: uppercase; line-height: 1.1; margin-left: 15px; }
        .dept-name span { color: #888; font-size: 11px; display: block; font-style: italic; }

        .form-card { max-width: 900px; margin: 0 auto; background: #0d1117; border: 1px solid #1c2626; padding: 25px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .section-header { background: var(--lssd-main); color: white; padding: 8px; text-align: center; font-weight: bold; text-transform: uppercase; font-size: 13px; margin: 25px 0 15px; }

        label { display: block; font-size: 12px; font-weight: bold; color: var(--lssd-main); margin-bottom: 5px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #12181d; border: 1px solid #1b3d3a; color: #4dc2bb; padding: 10px; margin-bottom: 15px; border-radius: 2px; outline: none; font-size: 14px; }
        input:focus, textarea:focus { border-color: #4dc2bb; background: #161e24; }

        .btn-lssd { background: var(--lssd-main); color: white; border: none; padding: 15px; width: 100%; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-lssd:hover { background: #4a632d; transform: translateY(-2px); }

        #result-container { display: none; margin-top: 30px; padding: 20px; background: #050505; border: 1px dashed var(--lssd-main); color: #00ff00; font-family: 'Consolas', monospace; font-size: 13px; white-space: pre-wrap; }
    </style>
</head>
<body>

<header class="header-lssd">
    <div class="container d-flex align-items-center">
        <img src="https://www.upload.ee" height="55">
        <div class="dept-name">
            Los Santos County Sheriff's Department
            <span>"A Tradition of Service" | Back Home Program</span>
        </div>
    </div>
</header>

<div class="container">
    <div class="form-card">
        <div align="center"><h3 style="color: var(--lssd-main); font-weight: bold;">ГЕНЕРАТОР ЗАЯВЛЕНИЯ</h3></div>
        
        <div class="section-header">1. ИНФОРМАЦИЯ О ПРОШЛОМ ОПЫТЕ</div>
        <label>1.1. Фракции, ники, ранги, причины и даты ухода:</label>
        <textarea id="exp" rows="3" placeholder="Nick, Project, Rank, Reason, Date"></textarea>

        <label>1.2. Доказательства вашей игры (СС, скриншоты):</label>
        <input type="text" id="proofs" placeholder="Ссылки на Imgur / Yapix">

        <label>1.3. Планируемая роль во фракции (Квента, 3-4 предложения):</label>
        <textarea id="role" rows="4" placeholder="Опишите характер вашего персонажа..."></textarea>

        <label>1.4. Список пожеланий, комментарий:</label>
        <input type="text" id="comment">

        <div class="section-header">2. ЛИЧНЫЕ ДАННЫЕ (OOC)</div>
        <div class="row">
            <div class="col-md-8"><label>ВАШЕ ИМЯ:</label><input type="text" id="name"></div>
            <div class="col-md-4"><label>ВОЗРАСТ:</label><input type="text" id="age" placeholder="XX"></div>
        </div>
        <label>НИК В TG (ДЛЯ ССЫЛКИ):</label>
        <input type="text" id="tg" placeholder="username">

        <label>СКРИНШОТ GOOGLE AUTHENTICATOR (ССЫЛКА):</label>
        <input type="text" id="gauth">

        <button class="btn-lssd" onclick="generate()">СГЕНЕРИРОВАТЬ КОД ДЛЯ ФОРУМА</button>

        <div id="result-container"></div>
    </div>
</div>

<script>
function generate() {
    const d = {
        exp: document.getElementById('exp').value || "Заполнить",
        proofs: document.getElementById('proofs').value || "Заполнить",
        role: document.getElementById('role').value || "Описание вашей роли...",
        comment: document.getElementById('comment').value || "Заполнить",
        name: document.getElementById('name').value || "Заполнить",
        age: document.getElementById('age').value || "XX",
        tg: document.getElementById('tg').value || "Nickname",
        gauth: document.getElementById('gauth').value || "Ссылка на скриншот"
    };

    const bbCode = `[box=#354920][img]https://www.upload.ee[/img][color=#FFFFFF]  Департамент шерифа Лос Сантоса > Карьера > Программа «Возвращение домой»[/color][/box]
[b][size=115][border=#354920]Заявление[/border][/size][/b]
[list=1][*][b]Фракции в которых состояли ([i]Никнейм, проект, должность, причины и даты ухода[/i]):[/b] ${d.exp}
[*][b]Доказательства игры [i](СС, не обязательно за копов[/i]):[/b] ${d.proofs}
[*][b]Планируемая роль во фракции:[/b]
[spoiler="Роль"]${d.role}[/spoiler]
[*][b]Список пожеланий, комментарий:[/b] ${d.comment}

[*][b]Имя:[/b] ${d.name}
[*][b]Возраст:[/b] ${d.age} лет
[*][b]Ссылка на аккаунт в TG:[/b] [url=https://t.me{d.tg}]${d.tg}[/url]
[*][b]Скриншот включенного Google Authenticator (без каких-либо обработок):[/b] [url=${d.gauth}]Ссылка на скриншот[/url][/list]

[hr][/hr]
[b][size=115][border=#354920]Соглашение[/border][/size][/b]
[list][b]Отправляя это заявление, вы автоматически соглашаетесь с приведенным ниже соглашением:[/b]

[list][i] [justify]Я соглашаюсь со всеми правилами и условиями полицейского департамента. Также уверяю, что все данные мною ответы в этой заявке являются правдивыми, и я не имею конфликтов с полицейским департаментом и не состою в черном списке сообщества. Я согласен быть активным с аккаунта полицейского больше, чем с каких-либо других имеющихся у меня аккаунтов.[/justify][/i][/list][/list]

[box=#354920][color=#FFFFFF][size=85][center]© 2024. Департамент шерифа округа Лос-Сантос. Все права защищены.[/center][/size][/color][/box]`;

    const out = document.getElementById('result-container');
    out.innerText = bbCode;
    out.style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}
</script>
</body>
</html>
