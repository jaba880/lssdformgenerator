<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>LSSD - Backhome Constructor</title>
    <style>
        /* --- НАСТРОЙКА ЦВЕТОВ ТУТ --- */
        :root {
            --accent-color: #354920;      /* Цвет полос и акцентов (сейчас темно-зеленый LSSD) */
            --border-color: #222;         /* Цвет рамок */
            --bg-dark: #0d0d0d;           /* Фон панелей */
            --input-bg: #0a0a0a;          /* Фон полей ввода */
            --blue-text: #4a9eff;         /* Цвет текста в синих разделителях */
            --main-font: 'Arial', sans-serif;
        }

        body { margin: 0; background-color: #080808; font-family: var(--main-font); color: #fff; }

        /* ВЕРХНИЙ БАР */
        .top-bar {
            background-color: #0a111a;
            height: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid #1a2a3a;
        }
        .city-tag { display: flex; align-items: center; gap: 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .city-tag img { width: 14px; height: 14px; }
        
        /* ШАПКА */
        .main-header {
            background-color: var(--bg-dark);
            height: 90px;
            display: flex;
            align-items: center;
            padding: 0 50px;
            border-bottom: 1px solid var(--border-color);
        }
        .logo-area { display: flex; align-items: center; gap: 20px; }
        
        /* --- НАСТРОЙКА РАЗМЕРА ЛОГОТИПА --- */
        .logo-area img { width: 50px; height: auto; } 

        .logo-text { border-left: 1px solid #222; padding-left: 20px; }
        .logo-text h1 { margin: 0; font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* КОНСТРУКТОР */
        .wrapper {
            width: 780px;
            margin: 40px auto;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
        }

        .title-block { padding: 20px; text-align: center; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        /* ЦВЕТНЫЕ ПОЛОСЫ РАЗДЕЛОВ */
        .section-header {
            background: #0d1a2a; /* Можно заменить на var(--accent-color), если хочешь зеленые */
            color: var(--blue-text);
            text-align: center;
            padding: 7px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            border-top: 1px solid #1a2a3a;
            border-bottom: 1px solid #1a2a3a;
        }

        .form-content { padding: 25px; }

        label {
            display: block;
            font-size: 10px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #ccc;
            padding: 12px;
            box-sizing: border-box;
            font-size: 11px;
            outline: none;
            margin-bottom: 20px;
        }

        input:focus { border-color: var(--accent-color); }

        .grid-half { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        /* СОГЛАШЕНИЕ */
        .check-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            font-size: 11px;
            font-weight: bold;
            padding: 20px;
        }
        .check-container input { width: 18px; height: 18px; cursor: pointer; }

        /* КНОПКИ */
        .btn-row { display: flex; justify-content: center; gap: 10px; padding-bottom: 40px; }
        .btn {
            background: #0d0d0d;
            border: 1px solid #333;
            color: #fff;
            padding: 10px 25px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            min-width: 150px;
        }
        .btn:hover { border-color: var(--accent-color); }

        /* МОДАЛКА */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .modal { background: #151515; width: 500px; border: 1px solid #333; padding: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="city-tag">
            <!-- ЛОГОТИП В ВЕРХНЕЙ ПОЛОСЕ -->
            <img src="https://www.upload.ee"> 
            Лос-Сантос
        </div>
        <div class="emergency-info" style="font-size: 10px; color: #888;">
            📞 Для экстренных ситуаций: <b style="color:#fff">Emergency Services</b>
        </div>
    </div>

    <div class="main-header">
        <div class="logo-area">
            <!-- ОСНОВНОЙ ЛОГОТИП ЛССД (ЗАМЕНИ ССЫЛКУ НИЖЕ) -->
            <img src="https://www.upload.ee" alt="LSSD LOGO">
            
            <div class="logo-text">
                <h1>Департамент шерифа Лос-Сантоса</h1>
                <p>To Serve and Protect</p>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <div class="title-block">Программа «Возвращение домой»</div>

        <div class="section-bar">1. Информация о прошлых местах игры</div>
        <div class="form-content">
            <label>1.1. Ник-нейм вашего персонажа:</label>
            <input type="text" id="nick" placeholder="Name_Surname">

            <label>1.2. Проекты и сообщества:</label>
            <textarea id="factions"></textarea>

            <div class="grid-half">
                <div>
                    <label>1.3. Звание/Отдел:</label>
                    <input type="text" id="rank">
                </div>
                <div>
                    <label>1.4. Причина ухода:</label>
                    <input type="text" id="reason">
                </div>
            </div>
        </div>

        <div class="section-bar">Соглашение</div>
        <div class="check-container">
            <input type="checkbox" id="agree">
            <span>Я принимаю условия данного заявления</span>
        </div>

        <div class="btn-row">
            <button class="btn" onclick="generate()">Сгенерировать</button>
            <button class="btn" style="color:#555" onclick="location.reload()">Назад</button>
        </div>
    </div>

    <div id="modal" class="overlay">
        <div class="modal">
            <div style="font-weight:bold; margin-bottom:10px;">BBCode готового заявления:</div>
            <textarea id="res-code" style="width:100%; height:150px; background:#000; color:#0f0; border:1px solid #333;"></textarea>
            <button class="btn" style="margin-top:10px; width:100%; background: #0060df;" onclick="copyAndGo()">На форум</button>
        </div>
    </div>

    <script>
        function generate() {
            if(!document.getElementById('agree').checked) { alert("Примите соглашение!"); return; }
            const nick = document.getElementById('nick').value || "Name_Surname";
            
            // Тут формируется сам текст заявления (BB-код)
            const bb = `[box=${document.documentElement.style.getPropertyValue('--accent-color') || '#354920'}][img]https://www.upload.ee[/img][color=#FFFFFF] LSSD > Backhome[/color][/box]\n[b]Ник:[/b] ${nick}\n[b]Опыт:[/b] ${document.getElementById('factions').value}`;
            
            document.getElementById('res-code').value = bb;
            document.getElementById('modal').style.display = 'flex';
        }

        function copyAndGo() {
            const code = document.getElementById('res-code');
            code.select();
            document.execCommand('copy');
            window.open('https://sd.ls-services.ru', '_blank');
        }
    </script>
</body>
</html>
